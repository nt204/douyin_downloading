services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /tmp/jobs:/tmp/jobs
      - ./runtime:/app/runtime
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: celery -A backend.tasks.pipeline.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - /tmp/jobs:/tmp/jobs
      - ./runtime:/app/runtime
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
